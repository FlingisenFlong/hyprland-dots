# --- Dina befintliga inställningar ---
shell fish
background_opacity 0.7
selection_background #2e1f5e
selection_foreground #c4a8ff
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
font_family JetBrainsMono Nerd Font
font_size 12.0

# --- Fix för den fula varningsrutan (Overlay colors) ---

# Den gula "Yes"-knappen styrs oftast av color3
color3  #c4a8ff
# Den grå/röda "No"-knappen styrs av color1 eller color8
color1  #7c5cbf
color8  #4a3391

# Bakgrunden på själva rutan (om den inte är genomskinlig)
color0  #1a1033

# Textfärgen i prompten
foreground #c4a8ff

# --- Valfritt: Gör ramen runt fönstret lila också ---
active_border_color   #c4a8ff
inactive_border_color #2e1f5e
